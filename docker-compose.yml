# Production-style run for NAS / VPS. Put TLS termination on your reverse proxy (Traefik, nginx, Synology).
services:
  color-matcher:
    build:
      context: .
      target: production
    image: color-matcher:latest
    restart: unless-stopped
    ports:
      - "${COLOR_MATCHER_PUBLISH_PORT:-8000}:8000"
    environment:
      COLOR_MATCHER_HOST: "0.0.0.0"
      COLOR_MATCHER_PORT: "8000"
      # Optional: if the UI is opened from another origin
      COLOR_MATCHER_CORS_ORIGINS: "${COLOR_MATCHER_CORS_ORIGINS:-}"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
